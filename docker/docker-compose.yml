version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: ragos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ragos:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ragos-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override so the app reaches the qdrant container, not localhost
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
